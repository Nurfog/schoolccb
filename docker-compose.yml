# docker-compose.yml - Sistema de Administración de Colegios
# Configuración optimizada con Rust, Node.js, Docker y PostgreSQL 16

services:
  # Servicio de Base de Datos - PostgreSQL 16
  db:
    build:
      context: .
      dockerfile: postgres/Dockerfile.postgres
    container_name: colleges_db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123!}
      POSTGRES_DB: ${DB_NAME:-colleges}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-colleges}"]
      interval: 10s
      retries: 5
      start_period: 10s
      timeout: 5s
    networks:
      - colleges_network
      - db_internal
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # Servicio Redis para caching (opcional)
  redis:
    image: redis:7-alpine
    container_name: colleges_redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 5s
      timeout: 5s
    networks:
      - colleges_network
      - db_internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    profiles:
      - with-redis

  # Servicio Backend en Rust
  backend:
    build:
      context: ./rust
      dockerfile: Dockerfile
    container_name: colleges_backend
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      DATABASE_URL: postgres://${DB_USERNAME:-postgres}:${DB_PASSWORD:-changeme123!}@db:5432/${DB_NAME:-colleges}
      PORT: ${BACKEND_PORT:-8080}
      NODE_ENV: ${NODE_ENV:-production}
      # Database pool configuration
      DATABASE_MAX_CONNECTIONS: ${DATABASE_MAX_CONNECTIONS:-20}
      DATABASE_MIN_CONNECTIONS: ${DATABASE_MIN_CONNECTIONS:-5}
      DATABASE_ACQUIRE_TIMEOUT: ${DATABASE_ACQUIRE_TIMEOUT:-30}
      DATABASE_IDLE_TIMEOUT: ${DATABASE_IDLE_TIMEOUT:-600}
      DATABASE_MAX_LIFETIME: ${DATABASE_MAX_LIFETIME:-1800}
      # JWT
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-changeme_secure_key_2024}
      # Redis (opcional)
      REDIS_URL: redis://redis:6379
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - colleges_network
      - db_internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      retries: 3
      start_period: 60s
      timeout: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # Servicio Frontend (compilado)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.frontend
    container_name: colleges_frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - colleges_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # Servicio Proxy Inverso Nginx
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: colleges_nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - colleges_network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      retries: 3
      start_period: 10s
      timeout: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # Certbot para renovación automática de certificados SSL
  certbot:
    image: certbot/certbot
    container_name: colleges_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - colleges_network
    profiles:
      - production

volumes:
  postgres_data:
    driver: local
    name: colleges_postgres_data
  redis_data:
    driver: local
    name: colleges_redis_data

networks:
  colleges_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
          gateway: 172.30.0.1
  db_internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.31.0.0/16
          gateway: 172.31.0.1
