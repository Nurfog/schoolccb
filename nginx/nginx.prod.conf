events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Upstream para el backend de Rust
    upstream backend_rust {
        server colleges_backend:8080;
    }

    # Upstream para el frontend de React
    upstream frontend_react {
        server colleges_frontend:80;
    }

    server {
        listen 80;
        server_name localhost school-ccb.xyz *.school-ccb.xyz;

        # Desafío ACME para Certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirigir todo lo demás a HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name localhost school-ccb.xyz *.school-ccb.xyz;

        # Configuración SSL (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/school-ccb.xyz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/school-ccb.xyz/privkey.pem;

        # Opciones de seguridad SSL recomendadas
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers "EECDH+AESGCM:EDH+AESGCM:AES256+EECDH:AES256+EDH";
        ssl_ecdh_curve secp384r1;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Redirigir peticiones de API al backend de Rust
        location /api/ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://backend_rust;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Todo lo demás va al frontend de React
        location / {
            proxy_pass http://frontend_react;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
